<!DOCTYPE html>
<html lang="en" data-theme="nord-dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FCHL Auction Manager</title>
    <link rel="icon" type="image/gif" href="/fchl_logos/0.gif">
    <script src="https://unpkg.com/htmx.org@1.9.10"></script>
    <link href="https://cdn.jsdelivr.net/npm/daisyui@4.12.14/dist/full.min.css" rel="stylesheet" type="text/css" />
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
    tailwind.config = {
        theme: {
            extend: {
                colors: {
                    nord: {
                        0: '#2e3440', 1: '#3b4252', 2: '#434c5e', 3: '#4c566a',
                        4: '#d8dee9', 5: '#e5e9f0', 6: '#eceff4',
                        7: '#8fbcbb', 8: '#88c0d0', 9: '#81a1c1', 10: '#5e81ac',
                        11: '#bf616a', 12: '#d08770', 13: '#ebcb8b', 14: '#a3be8c', 15: '#b48ead',
                    }
                }
            }
        }
    }
    </script>
    <style>
    /* Nord DaisyUI theme — oklch color space (DaisyUI v4 requirement) */
    [data-theme="nord-dark"] {
        color-scheme: dark;
        --b1: 32.44% 0.0230 264.19;    /* nord0 #2e3440 — base background */
        --b2: 37.92% 0.0290 266.47;    /* nord1 #3b4252 — panels/cards */
        --b3: 41.57% 0.0324 264.13;    /* nord2 #434c5e — hover/borders */
        --bc: 95.13% 0.0075 260.76;    /* nord6 #eceff4 — base content text */
        --p: 77.46% 0.0623 217.52;     /* nord8 #88c0d0 — primary (accent) */
        --pc: 32.44% 0.0230 264.19;    /* nord0 — dark text on primary */
        --s: 69.65% 0.0592 248.71;     /* nord9 #81a1c1 — secondary (blue) */
        --sc: 32.44% 0.0230 264.19;    /* nord0 — dark text on secondary */
        --a: 85.49% 0.0892 84.10;      /* nord13 #ebcb8b — accent (yellow) */
        --ac: 32.44% 0.0230 264.19;    /* nord0 — dark text on accent */
        --n: 45.23% 0.0353 264.13;     /* nord3 #4c566a — neutral */
        --nc: 89.93% 0.0165 262.76;    /* nord4 #d8dee9 — neutral content */
        --su: 76.83% 0.0749 131.10;    /* nord14 #a3be8c — success (green) */
        --suc: 32.44% 0.0230 264.19;   /* nord0 */
        --wa: 85.49% 0.0892 84.10;     /* nord13 #ebcb8b — warning (yellow) */
        --wac: 32.44% 0.0230 264.19;   /* nord0 */
        --er: 60.61% 0.1206 15.32;     /* nord11 #bf616a — error (red) */
        --erc: 95.13% 0.0075 260.76;   /* nord6 — light text on error */
        --in: 77.46% 0.0623 217.52;    /* nord8 #88c0d0 — info */
        --inc: 32.44% 0.0230 264.19;   /* nord0 */
        --rounded-btn: 0.25rem;
        --rounded-box: 0.375rem;
        --border-btn: 1px;
    }
    </style>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div class="navbar bg-base-200 border-b border-base-300 px-4 sticky top-0 z-50 min-h-0 h-10">
        <div class="flex-1 gap-2">
            <img src="/fchl_logos/0.gif" alt="FCHL" class="w-7 h-7">
            <span class="text-base font-bold text-primary">FCHL Auction Manager</span>
        </div>
        <div class="flex-none gap-2">
            <button hx-post="/undo" hx-target="#app" hx-swap="innerHTML" class="btn btn-xs btn-outline btn-info" title="Undo (Ctrl+Z)">
                ↩ Undo
            </button>

        </div>
    </div>
    <main id="app">
        {% block content %}{% endblock %}
    </main>
    <script src="/static/shortcuts.js"></script>
</body>
</html>
