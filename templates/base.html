<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FCHL Auction Simulator</title>
    <script src="https://unpkg.com/htmx.org@1.9.10"></script>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <header>
        <div class="header-left">
            <img src="/fchl_logos/0.gif" alt="FCHL" class="league-logo">
            <h1>FCHL Auction Simulator</h1>
        </div>
        <div class="header-right">
            <button hx-post="/undo" hx-target="#app" hx-swap="innerHTML" class="btn btn-undo" title="Undo (Ctrl+Z)">
                ↩ Undo
            </button>
            <button hx-post="/save" hx-swap="none" class="btn btn-save">Save</button>
        </div>
    </header>
    <main id="app">
        {% block content %}{% endblock %}
    </main>
    <script src="/static/shortcuts.js"></script>
</body>
</html>
