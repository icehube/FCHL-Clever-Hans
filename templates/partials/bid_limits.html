<section class="card bg-base-200 shadow-md p-4" id="bid-limits">
    <h2 class="card-title text-accent text-base mb-1">Available Players ({{ bid_limits|length }})</h2>
    <div class="flex gap-4 text-xs mb-2">
        <span class="flex items-center gap-1"><span class="w-3 h-3 rounded-sm inline-block" style="background:rgba(163,190,140,0.25)"></span> In optimal roster</span>
        <span class="flex items-center gap-1"><span class="w-3 h-3 rounded-sm inline-block border-l-2 border-warning"></span> RFA</span>
    </div>
    <div id="player-chart-container"></div>
    <div class="scroll-container">
        <table class="table table-xs table-zebra">
            <thead>
                <tr>
                    <th data-sort-col="0" data-sort-type="text" onclick="sortTable(this)" class="cursor-pointer">Pos</th>
                    <th data-sort-col="1" data-sort-type="text" onclick="sortTable(this)" class="cursor-pointer">Player</th>
                    <th data-sort-col="2" data-sort-type="text" onclick="sortTable(this)" class="cursor-pointer">NHL</th>
                    <th data-sort-col="3" data-sort-type="number" onclick="sortTable(this)" class="cursor-pointer">PTS</th>
                    <th data-sort-col="4" data-sort-type="currency" onclick="sortTable(this)" class="cursor-pointer">Model $</th>
                    <th data-sort-col="5" data-sort-type="currency" onclick="sortTable(this)" class="cursor-pointer">Market $</th>
                    <th data-sort-col="6" data-sort-type="text" onclick="sortTable(this)" class="cursor-pointer">RFA</th>
                    <th></th>
                </tr>
            </thead>
            <tbody>
            {% for p in bid_limits %}
            <tr class="hover {% if p.in_optimal %}in-optimal{% endif %} {% if p.is_rfa %}is-rfa{% endif %}">
                <td>{{ p.position }}</td>
                <td><a hx-get="/player-chart/{{ p.name|urlencode }}" hx-target="#player-chart-container" hx-swap="innerHTML" class="link link-info text-sm">{{ p.name }}</a></td>
                <td><img src="/nhl_logos/{{ p.nhl_team }}.svg" alt="{{ p.nhl_team }}" class="h-5 inline object-contain" title="{{ p.nhl_team }}"></td>
                <td>{{ p.projected_points }}</td>
                <td>${{ p.model_price }}M</td>
                <td>${{ p.market_price }}M</td>
                <td>{% if p.is_rfa %}<span class="badge badge-warning badge-xs">{{ p.prior_fchl_team }}</span>{% endif %}</td>
                <td class="flex gap-1">
                    <button type="button" class="btn btn-xs btn-ghost btn-circle btn-add-bid" data-player="{{ p.name }}" title="Add to bid">+</button>
                    <a hx-get="/explain/{{ p.name|urlencode }}" hx-target="#explanation" hx-swap="outerHTML" class="btn btn-xs btn-ghost btn-circle">?</a>
                </td>
            </tr>
            {% endfor %}
            </tbody>
        </table>
    </div>
</section>
